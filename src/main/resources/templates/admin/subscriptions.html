<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Subscriptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='subscriptions')}"></th:block>
<main class="admin-app__main">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-2">
        <h1 class="admin-page-title mb-0">Subscriptions</h1>
        <button class="btn btn-primary btn-sm" data-bs-target="#createSubscriptionModal" data-bs-toggle="modal" type="button">
            New Subscription
        </button>
    </div>
    <p class="admin-section-lead">Подписки: персональные и групповые. Триал и продления — вручную из карточки.</p>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="get" class="row g-2 align-items-end mb-3" th:action="@{/admin/subscriptions}">
        <div class="col-auto">
            <label class="form-label" for="filterPlan">Plan</label>
            <select class="form-select form-select-sm" id="filterPlan" name="plan">
                <option value="">Все</option>
                <option th:each="p : ${plans}" th:text="${p}" th:value="${p}" th:selected="${p.name() == selectedPlan}"></option>
            </select>
        </div>
        <div class="col-auto">
            <label class="form-label" for="filterStatus">Status</label>
            <select class="form-select form-select-sm" id="filterStatus" name="status">
                <option value="">Все</option>
                <option th:each="s : ${statuses}" th:text="${s}" th:value="${s}" th:selected="${s.name() == selectedStatus}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" type="submit">Применить</button>
            <a class="btn btn-link btn-sm" th:href="@{/admin/subscriptions}">Сбросить</a>
        </div>
    </form>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-striped table-hover align-middle mb-0 admin-data-table">
                <thead>
                <tr>
                    <th class="admin-num" scope="col">ID</th>
                    <th scope="col">Plan</th>
                    <th scope="col">Bot</th>
                    <th scope="col">Owner</th>
                    <th scope="col">Scope chat</th>
                    <th scope="col">Status</th>
                    <th scope="col">Expires</th>
                    <th class="admin-table-actions" scope="col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(subscriptions)}">
                    <td colspan="8" class="admin-empty-state">Подписок пока нет.</td>
                </tr>
                <tr th:each="s : ${subscriptions}">
                    <td class="admin-num" th:text="${s.id}">1</td>
                    <td th:text="${s.plan}">PERSONAL</td>
                    <td th:text="${s.botId}">1</td>
                    <td th:text="${s.ownerUserId}">1</td>
                    <td th:text="${s.scopeChatId ?: '—'}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="${s.status.name() == 'ACTIVE' or s.status.name() == 'TRIAL'} ? ' bg-success' : (${s.status.name() == 'EXPIRED' or s.status.name() == 'CANCELLED'} ? ' bg-secondary' : ' bg-warning text-dark')"
                              th:text="${s.status}">ACTIVE</span>
                    </td>
                    <td th:text="${s.expiresAt}">—</td>
                    <td class="admin-table-actions">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/admin/subscriptions/' + ${s.id}}">Open</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</div>

<div class="modal fade" id="createSubscriptionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5">New Subscription</h2>
                <button class="btn-close" data-bs-dismiss="modal" type="button" aria-label="Close"></button>
            </div>
            <form method="post" th:action="@{/admin/subscriptions/create}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="newOwner">Owner user_id</label>
                        <input class="form-control" id="newOwner" name="ownerUserId" type="number" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newBot">Bot</label>
                        <select class="form-select" id="newBot" name="botId" required>
                            <option th:each="b : ${bots}" th:text="${b.id} + ' · ' + ${b.name}" th:value="${b.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newPlan">Plan</label>
                        <select class="form-select" id="newPlan" name="plan" required>
                            <option th:each="p : ${plans}" th:text="${p}" th:value="${p}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newScope">Scope chat_id (для GROUP_*)</label>
                        <input class="form-control" id="newScope" name="scopeChatId" type="number">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancel</button>
                    <button class="btn btn-primary" type="submit">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
