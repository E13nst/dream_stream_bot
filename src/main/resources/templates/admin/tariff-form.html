<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isNew} ? 'Новый тариф' : 'Тариф'">Тариф</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='tariffs')}"></th:block>
<main class="admin-app__main">
    <div class="mb-3">
        <a class="btn btn-sm btn-outline-secondary"
           th:href="@{/admin/tariffs(botId=${tariff.botId})}">&larr; К списку</a>
    </div>

    <h1 class="admin-page-title" th:text="${isNew} ? 'Новый тариф' : 'Редактирование тарифа'">Тариф</h1>

    <div class="alert alert-info small">
        <strong>FREE_UNLIMITED</strong> — бессрочно после согласий (личка). 
        <strong>TRIAL_ONBOARDING</strong> — нужен срок пробного периода (дни).
        <strong>PAID_TERM</strong> — доступ по выданным периодам или ручной активации; для группы — после согласий ожидает включения админом.
    </div>

    <div class="card p-3 mb-5" style="max-width: 640px;">
        <form th:if="${isNew}" method="post" th:action="@{/admin/tariffs/create}" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="col-12">
                <label class="form-label">Бот</label>
                <select class="form-select" name="botId" required>
                    <option th:each="b : ${bots}" th:value="${b.id}"
                            th:selected="${presetBotId != null and presetBotId == b.id}"
                            th:text="${b.id} + ' · ' + ${b.name}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Код (латиница, например PERSONAL_PLUS)</label>
                <input class="form-control" name="code" required maxlength="64">
            </div>
            <div class="col-md-6">
                <label class="form-label">Порядок сортировки</label>
                <input class="form-control" name="sortOrder" type="number" value="99">
            </div>
            <div class="col-12">
                <label class="form-label">Название</label>
                <input class="form-control" name="title" required maxlength="255">
            </div>
            <div class="col-md-6">
                <label class="form-label">Область</label>
                <select class="form-select" name="scope">
                    <option th:each="sc : ${scopes}" th:value="${sc}" th:text="${sc}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Режим доступа</label>
                <select class="form-select" name="accessMode">
                    <option th:each="m : ${modes}" th:value="${m}" th:text="${m}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Дней триала (для TRIAL_ONBOARDING)</label>
                <input class="form-control" name="trialDays" type="number" min="1" placeholder="пусто">
            </div>
            <div class="col-md-6">
                <label class="form-label">Max участников (GROUP)</label>
                <input class="form-control" name="maxParticipants" type="number" min="1" placeholder="пусто для лички">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" id="tariffActiveNew" type="checkbox" name="active" value="true" checked>
                    <label class="form-check-label" for="tariffActiveNew">Активен</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" id="defPersNew" type="checkbox" name="defaultPersonal" value="true">
                    <label class="form-check-label" for="defPersNew">По умолчанию для лички этого бота</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" id="defGrpNew" type="checkbox" name="defaultGroup" value="true">
                    <label class="form-check-label" for="defGrpNew">По умолчанию для группы этого бота</label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Создать</button>
            </div>
        </form>

        <form th:unless="${isNew}" method="post" th:action="@{'/admin/tariffs/' + ${tariff.id} + '/update'}" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="botId" th:value="${tariff.botId}">
            <div class="col-12">
                <label class="form-label">Бот ID</label>
                <input class="form-control" th:value="${tariff.botId}" disabled readonly>
            </div>
            <div class="col-md-6">
                <label class="form-label">Код</label>
                <input class="form-control" name="code" th:value="${tariff.code}" required maxlength="64">
            </div>
            <div class="col-md-6">
                <label class="form-label">Порядок</label>
                <input class="form-control" name="sortOrder" type="number" th:value="${tariff.sortOrder}">
            </div>
            <div class="col-12">
                <label class="form-label">Название</label>
                <input class="form-control" name="title" th:value="${tariff.title}" required maxlength="255">
            </div>
            <div class="col-md-6">
                <label class="form-label">Область</label>
                <select class="form-select" name="scope">
                    <option th:each="sc : ${scopes}"
                            th:value="${sc}"
                            th:selected="${sc == tariff.scope}"
                            th:text="${sc}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Режим</label>
                <select class="form-select" name="accessMode">
                    <option th:each="m : ${modes}"
                            th:value="${m}"
                            th:selected="${m == tariff.accessMode}"
                            th:text="${m}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Дней триала</label>
                <input class="form-control" name="trialDays" type="number" min="1" th:value="${tariff.trialDays}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Max участников</label>
                <input class="form-control" name="maxParticipants" type="number" min="1" th:value="${tariff.maxParticipants}">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" id="tariffActiveEd" type="checkbox" name="active" value="true"
                           th:checked="${tariff.active}">
                    <label class="form-check-label" for="tariffActiveEd">Активен</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" id="defPersEd" type="checkbox" name="defaultPersonal" value="true"
                           th:checked="${tariff.defaultPersonal}">
                    <label class="form-check-label" for="defPersEd">По умолчанию для лички</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" id="defGrpEd" type="checkbox" name="defaultGroup" value="true"
                           th:checked="${tariff.defaultGroup}">
                    <label class="form-check-label" for="defGrpEd">По умолчанию для группы</label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
