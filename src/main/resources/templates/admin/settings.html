<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="polite">
    <div class="alert alert-success" role="alert" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger"  role="alert" th:if="${error}"   th:text="${error}"></div>
</div>
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='settings')}"></th:block>
<main class="admin-app__main">
    <h1 class="admin-page-title">Settings</h1>
    <p class="admin-section-lead">Настройки учётной записи администратора и параметры сервиса (без деплоя).</p>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Системные параметры</h2>
                    <form th:action="@{/admin/settings/system}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="retentionDaysAfterExpiry">Хранение истории после окончания подписки (дней)</label>
                            <input class="form-control" type="number" min="1" max="3650" required
                                   id="retentionDaysAfterExpiry" name="retentionDaysAfterExpiry" th:value="${retentionDays}">
                            <div class="form-text">По умолчанию 90. Используется ночным заданием очистки памяти диалогов.</div>
                        </div>
                        <div class="mb-3 form-check">
                            <input class="form-check-input" type="checkbox" id="retentionUnlimited" name="retentionUnlimited" value="true"
                                   th:checked="${retentionUnlimited}">
                            <label class="form-check-label" for="retentionUnlimited">Бессрочное хранение (retention job отключён)</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="gatingDedupHours">Интервал повторных заглушек доступа (часы)</label>
                            <input class="form-control" type="number" min="1" max="168" required
                                   id="gatingDedupHours" name="gatingDedupHours" th:value="${gatingDedupHours}">
                        </div>
                        <button class="btn btn-primary" type="submit">Сохранить параметры</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-4">Смена пароля</h2>
                    <form th:action="@{/admin/settings/password}" method="post" id="changePasswordForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label" for="currentPassword">Текущий пароль</label>
                            <div class="input-group">
                                <input autocomplete="current-password" class="form-control"
                                       id="currentPassword" name="currentPassword" required type="password">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('currentPassword', this)" aria-label="Показать/скрыть">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="newPassword">Новый пароль</label>
                            <div class="input-group">
                                <input autocomplete="new-password" class="form-control"
                                       id="newPassword" minlength="8" name="newPassword" required type="password">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('newPassword', this)" aria-label="Показать/скрыть">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="form-text">Минимум 8 символов.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="confirmPassword">Подтверждение нового пароля</label>
                            <div class="input-group">
                                <input autocomplete="new-password" class="form-control"
                                       id="confirmPassword" minlength="8" name="confirmPassword" required type="password">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('confirmPassword', this)" aria-label="Показать/скрыть">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                                    </svg>
                                </button>
                            </div>
                            <div id="confirmError" class="text-danger small mt-1" style="display:none">Пароли не совпадают</div>
                        </div>

                        <button class="btn btn-primary" type="submit">Сохранить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(fieldId, btn) {
        var input = document.getElementById(fieldId);
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.innerHTML = isHidden
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47q-.27.238-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>';
    }

    document.getElementById('changePasswordForm').addEventListener('submit', function (e) {
        var np = document.getElementById('newPassword').value;
        var cp = document.getElementById('confirmPassword').value;
        var err = document.getElementById('confirmError');
        if (np !== cp) {
            err.style.display = 'block';
            e.preventDefault();
        } else {
            err.style.display = 'none';
        }
    });

    (function () {
        var host = document.getElementById('adminToastHost');
        if (!host) return;
        host.querySelectorAll('.alert').forEach(function (el) {
            window.setTimeout(function () {
                el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                el.style.opacity = '0';
                el.style.transform = 'translateX(12px)';
                window.setTimeout(function () { el.remove(); }, 320);
            }, 4000);
        });
    })();
</script>
</body>
</html>
