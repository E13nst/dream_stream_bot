<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Tariffs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='tariffs')}"></th:block>
<main class="admin-app__main">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-2">
        <h1 class="admin-page-title mb-0">Тарифы</h1>
        <a class="btn btn-primary btn-sm" th:if="${!#lists.isEmpty(bots)}"
           th:href="@{/admin/tariffs/new(botId=${filterBotId != null ? filterBotId : bots.get(0).id})}">
            Новый тариф
        </a>
    </div>
    <p class="admin-section-lead">Шаблоны доступа для ботов: безлимит, триал после согласий, оплатной срок. Один тариф можно привязать только к своему боту.</p>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="get" class="row g-2 align-items-end mb-3" th:action="@{/admin/tariffs}">
        <div class="col-auto">
            <label class="form-label" for="filterBot">Бот</label>
            <select class="form-select form-select-sm" id="filterBot" name="botId" onchange="this.form.submit()">
                <option value="">Все</option>
                <option th:each="b : ${bots}" th:value="${b.id}" th:selected="${filterBotId != null and filterBotId == b.id}"
                        th:text="${b.id} + ' · ' + ${b.name}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-secondary btn-sm" type="submit">Применить</button>
            <a class="btn btn-link btn-sm" th:href="@{/admin/tariffs}">Сбросить</a>
        </div>
    </form>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-striped table-hover align-middle mb-0 admin-data-table">
                <thead>
                <tr>
                    <th class="admin-num" scope="col">ID</th>
                    <th scope="col">Бот</th>
                    <th scope="col">Код</th>
                    <th scope="col">Название</th>
                    <th scope="col">Область</th>
                    <th scope="col">Режим</th>
                    <th scope="col">Порядок</th>
                    <th scope="col">По умолч.</th>
                    <th scope="col">Акт.</th>
                    <th class="admin-table-actions" scope="col">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tariffs)}">
                    <td colspan="10" class="admin-empty-state">Тарифов нет.</td>
                </tr>
                <tr th:each="t : ${tariffs}">
                    <td class="admin-num" th:text="${t.id}">1</td>
                    <td th:text="${t.botId}">1</td>
                    <td th:text="${t.code}"></td>
                    <td th:text="${t.title}"></td>
                    <td th:text="${t.scope}"></td>
                    <td th:text="${t.accessMode}"></td>
                    <td th:text="${t.sortOrder}"></td>
                    <td>
                        <span th:if="${t.defaultPersonal}" class="badge bg-info text-dark me-1">личка</span>
                        <span th:if="${t.defaultGroup}" class="badge bg-secondary">группа</span>
                        <span th:if="${!t.defaultPersonal && !t.defaultGroup}">—</span>
                    </td>
                    <td th:text="${t.active}"></td>
                    <td class="admin-table-actions">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{'/admin/tariffs/' + ${t.id} + '/edit?botId=' + ${t.botId}}">Изменить</a>
                        <form class="d-inline" method="post" th:action="@{'/admin/tariffs/' + ${t.id} + '/delete'}"
                              onsubmit="return confirm('Удалить тариф? Если есть подписки — операция будет отклонена.');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="botId" th:value="${t.botId}">
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-1">Удалить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
