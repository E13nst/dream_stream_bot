<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-login">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="assertive">
    <div class="alert alert-danger" role="alert" th:if="${param.error}">
        Неверный логин или пароль
    </div>
    <div class="alert alert-success" role="alert" th:if="${param.logout}">
        Вы вышли из системы
    </div>
</div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card admin-login-card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Dream Stream Admin</h1>
                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input autocomplete="username" class="form-control" id="username" name="username" required type="text">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input autocomplete="current-password" class="form-control" id="password" name="password" required type="password">
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Sign in</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    (function () {
        var host = document.getElementById('adminToastHost');
        if (!host) return;
        host.querySelectorAll('.alert').forEach(function (el) {
            window.setTimeout(function () {
                el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                el.style.opacity = '0';
                el.style.transform = 'translateX(12px)';
                window.setTimeout(function () { el.remove(); }, 320);
            }, 4000);
        });
    })();
</script>
</body>
</html>
