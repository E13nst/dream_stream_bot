<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="adminNav (active)">
    <nav class="admin-sidebar" role="navigation" aria-label="Админка">
        <a class="admin-sidebar-brand mb-0 text-decoration-none" th:href="@{/admin}">Dream Stream Admin</a>
        <div class="admin-sidebar-links">
            <a class="admin-nav-link" th:classappend="${active == 'dashboard'} ? ' admin-nav-link--active'" th:href="@{/admin}">Dashboard</a>
            <a class="admin-nav-link" th:classappend="${active == 'users'} ? ' admin-nav-link--active'" th:href="@{/admin/users}">Users</a>
            <a class="admin-nav-link" th:classappend="${active == 'bots'} ? ' admin-nav-link--active'" th:href="@{/admin/bots}">Bots</a>
            <a class="admin-nav-link" th:classappend="${active == 'settings'} ? ' admin-nav-link--active'" th:href="@{/admin/settings}">Settings</a>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-danger w-100" type="submit">Logout</button>
        </form>
    </nav>
</th:block>
</body>
</html>
