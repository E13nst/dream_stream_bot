<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="botsTable">
    <div class="card">
    <div class="table-responsive">
        <table class="table table-sm table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Type</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:classappend="${selectedId != null && selectedId == bot.id} ? 'table-primary'" th:each="bot : ${bots}">
                <td th:text="${bot.id}">1</td>
                <td th:text="${bot.name}">Bot</td>
                <td th:text="${bot.username}">bot_username</td>
                <td th:text="${bot.type}">assistant</td>
                <td>
                    <span class="badge" th:classappend="${bot.isActive} ? ' bg-success' : ' bg-secondary'"
                          th:text="${bot.isActive} ? 'ACTIVE' : 'INACTIVE'">ACTIVE</span>
                </td>
                <td>
                    <a class="btn btn-sm btn-outline-secondary"
                       th:href="@{'/admin/bots?selectedId=' + ${bot.id}}">
                        Open
                    </a>
                    <form class="d-inline" method="post" th:action="@{'/admin/bots/' + ${bot.id} + '/toggle'}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-outline-primary" type="submit" th:text="${bot.isActive} ? 'Deactivate' : 'Activate'">Toggle</button>
                    </form>
                    <form class="d-inline" method="post" th:action="@{'/admin/bots/' + ${bot.id} + '/delete'}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this bot?')" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>
</div>
</body>
</html>
