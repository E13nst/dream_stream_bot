<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">Dream Stream Admin</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/admin/bots}">Bots</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h4 mb-3">Users</h1>
    <div class="mb-3">
        <input class="form-control"
               name="query"
               placeholder="Search by username, name or telegram id"
               th:value="${query}"
               hx-get="/admin/users/table"
               hx-target="#usersTable"
               hx-trigger="keyup changed delay:300ms, search">
    </div>
    <div id="usersTable" th:replace="~{admin/fragments/users-table :: usersTable}"></div>
</main>
</body>
</html>
