<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consent · edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='consents')}"></th:block>
<main class="admin-app__main">
    <div class="mb-3">
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/consents}">&larr; Все документы</a>
    </div>

    <h1 class="admin-page-title">
        <span th:text="${document.code}">OFFER</span>
        <span class="text-muted">· v<span th:text="${document.version}">1</span></span>
    </h1>

    <p>
        <span th:if="${document.current}" class="badge bg-success">current</span>
        <span th:unless="${document.current}" class="badge bg-secondary">draft</span>
    </p>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="@{'/admin/consents/' + ${document.id} + '/publish'}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="row g-3">
            <div class="col-md-8">
                <label class="form-label" for="editTitle">Title</label>
                <input class="form-control" id="editTitle" name="title" type="text" required
                       th:value="${document.title}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="editChange">Change type</label>
                <select class="form-select" id="editChange" name="changeType">
                    <option th:each="ct : ${changeTypes}" th:text="${ct}" th:value="${ct}"
                            th:selected="${ct == document.changeType}"></option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label" for="editUrl">External URL</label>
                <input class="form-control" id="editUrl" name="externalUrl" type="url"
                       th:value="${document.externalUrl}">
                <div class="form-text">Заполняется автоматически после публикации в Telegra.ph.</div>
            </div>
            <div class="col-12">
                <label class="form-label" for="editBody">Markdown body</label>
                <textarea class="form-control" id="editBody" name="bodyMarkdown" rows="14"
                          th:text="${document.bodyMarkdown}"></textarea>
            </div>
            <div class="col-12 d-flex gap-3 align-items-center">
                <div class="form-check">
                    <input class="form-check-input" id="toTelegraph" name="toTelegraph" type="checkbox" value="true">
                    <label class="form-check-label" for="toTelegraph">
                        Опубликовать в Telegra.ph и обновить ссылку
                    </label>
                </div>
                <button class="btn btn-primary" type="submit">Опубликовать как текущую</button>
            </div>
        </div>
    </form>

    <div class="mt-4 small text-muted">
        Создано: <span th:text="${document.createdAt}">—</span>
        · Опубликовано: <span th:text="${document.publishedAt ?: '—'}">—</span>
        · Telegraph path: <span th:text="${document.telegraphPath ?: '—'}">—</span>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
