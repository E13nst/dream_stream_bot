<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Bots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">Dream Stream Admin</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/admin/users}">Users</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Bots Management</h1>
        <button class="btn btn-primary btn-sm" data-bs-target="#createBotModal" data-bs-toggle="modal" type="button">
            Create Bot
        </button>
    </div>
    <p class="text-muted small mb-3">Select a bot to edit parameters and prompt. All actions are available from this page.</p>
    <div id="botsTable" th:replace="~{admin/fragments/bots-table :: botsTable}"></div>
</main>
<div aria-hidden="true" aria-labelledby="createBotModalLabel" class="modal fade" id="createBotModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="createBotModalLabel">Create Bot</h2>
                <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <form id="createBotForm" method="post" th:action="@{/admin/bots/create}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input class="form-control" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input class="form-control" name="username" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Token</label>
                            <input class="form-control" name="token" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Type</label>
                            <select class="form-select" name="type" required>
                                <option th:each="botType : ${botTypes}" th:text="${botType.value}" th:value="${botType.value}">assistant</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Memory Window</label>
                            <input class="form-control" min="1" name="memWindow" type="number" value="100">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Prompt</label>
                            <textarea class="form-control" name="prompt" rows="4"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Keywords (comma separated)</label>
                            <input class="form-control" name="keywords" placeholder="dream, sleep, interpretation">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Webhook URL</label>
                            <input class="form-control" name="webhookUrl">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Miniapp URL</label>
                            <input class="form-control" name="miniapp">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <input class="form-control" name="description">
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input checked class="form-check-input" id="createIsActive" name="isActive" type="checkbox" value="true">
                                <label class="form-check-label" for="createIsActive">Activate immediately</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancel</button>
                <button class="btn btn-primary" form="createBotForm" type="submit">Create Bot</button>
            </div>
        </div>
    </div>
</div>
<div aria-hidden="true" aria-labelledby="botDetailsModalLabel" class="modal fade" id="botDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="botDetailsModalLabel">Bot Details</h2>
                <a aria-label="Close" class="btn-close" th:href="@{/admin/bots}"></a>
            </div>
            <div class="modal-body">
                <div th:replace="~{admin/fragments/bot-details :: botDetails}"></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const selectedId = /*[[${selectedId}]]*/ null;
    if (selectedId !== null) {
        const detailsModal = new bootstrap.Modal(document.getElementById('botDetailsModal'));
        detailsModal.show();
        document.getElementById('botDetailsModal').addEventListener('hidden.bs.modal', function () {
            window.location.href = '/admin/bots';
        }, { once: true });
    }
</script>
</body>
</html>
