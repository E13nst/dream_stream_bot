spring:
  application:
    name: telegram-bot-dream-stream-test

  ai:
    openai:
      api-url: api.openai.com/v1
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.8

logging:
  level:
    root: INFO
    com.example.dream_stream_bot: DEBUG

openai:
  token: ${OPENAI_API_KEY}
