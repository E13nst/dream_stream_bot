<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Bots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="polite"></div>
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='bots')}"></th:block>
<main class="admin-app__main">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-2">
        <h1 class="admin-page-title mb-0">Bots Management</h1>
        <button class="btn btn-primary btn-sm" data-bs-target="#createBotModal" data-bs-toggle="modal" type="button">
            Create Bot
        </button>
    </div>
    <p class="admin-section-lead">Выберите бота для редактирования параметров и промпта. Все действия доступны на этой странице.</p>
    <div id="botsTable" th:replace="~{admin/fragments/bots-table :: botsTable}"></div>
</main>
</div>
<div aria-hidden="true" aria-labelledby="createBotModalLabel" class="modal fade" id="createBotModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="createBotModalLabel">Create Bot</h2>
                <button aria-label="Close create bot dialog" class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <form id="createBotForm" method="post" th:action="@{/admin/bots/create}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="createBotName">Name</label>
                            <input class="form-control" id="createBotName" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="createBotUsername">Username</label>
                            <input class="form-control" id="createBotUsername" name="username" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="createBotToken">Token</label>
                            <input class="form-control" id="createBotToken" name="token" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="createBotType">Type</label>
                            <select class="form-select" id="createBotType" name="type" required>
                                <option th:each="botType : ${botTypes}" th:text="${botType.value}" th:value="${botType.value}">assistant</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="createBotMemWindow">Memory Window</label>
                            <input class="form-control" id="createBotMemWindow" min="1" name="memWindow" type="number" value="100">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="createBotPrompt">Prompt</label>
                            <textarea class="form-control" id="createBotPrompt" name="prompt" rows="4"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="createBotKeywords">Keywords (comma separated)</label>
                            <input class="form-control" id="createBotKeywords" name="keywords" placeholder="dream, sleep, interpretation">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="createBotWebhook">Webhook URL</label>
                            <input class="form-control" id="createBotWebhook" name="webhookUrl">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="createBotMiniapp">Miniapp URL</label>
                            <input class="form-control" id="createBotMiniapp" name="miniapp">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="createBotDescription">Description</label>
                            <input class="form-control" id="createBotDescription" name="description">
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input checked class="form-check-input" id="createIsActive" name="isActive" type="checkbox" value="true">
                                <label class="form-check-label" for="createIsActive">Activate immediately</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancel</button>
                <button class="btn btn-primary" form="createBotForm" type="submit">Create Bot</button>
            </div>
        </div>
    </div>
</div>
<div aria-hidden="true" aria-labelledby="botDetailsModalLabel" class="modal fade" id="botDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5" id="botDetailsModalLabel">Bot Details</h2>
                <button aria-label="Закрыть" class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <div th:replace="~{admin/fragments/bot-details :: botDetails}"></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    (function () {
        var open = /*[[${openBotDetailsModal}]]*/ false;
        var modalEl = document.getElementById('botDetailsModal');
        var botsListUrl = /*[[@{/admin/bots}]]*/ '/admin/bots';
        if (!open || !modalEl || typeof bootstrap === 'undefined') {
            return;
        }
        bootstrap.Modal.getOrCreateInstance(modalEl).show();
        modalEl.addEventListener('hidden.bs.modal', function () {
            if (window.location.search.indexOf('selectedId=') !== -1) {
                window.location.replace(botsListUrl);
            }
        }, { once: true });
    })();
    /*]]>*/
</script>
</body>
</html>
