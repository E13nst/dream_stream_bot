<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Agents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="polite"></div>
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='agents')}"></th:block>
<main class="admin-app__main">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-2">
        <h1 class="admin-page-title mb-0">LLM Agents</h1>
        <button class="btn btn-primary btn-sm" data-bs-target="#createAgentModal" data-bs-toggle="modal" type="button">
            Create Agent
        </button>
    </div>
    <p class="admin-section-lead">Параметры модели и системный промпт применяются без перезапуска (кэш сбрасывается при сохранении).</p>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-sm table-striped table-hover align-middle mb-0 admin-data-table">
                <thead>
                <tr>
                    <th class="admin-num" scope="col">ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Role</th>
                    <th scope="col">Provider</th>
                    <th scope="col">Model</th>
                    <th scope="col">Temp</th>
                    <th class="admin-table-actions" scope="col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${agents == null or #lists.isEmpty(agents)}">
                    <td class="admin-empty-state" colspan="7">
                        <strong>Агентов пока нет</strong> — создайте первого кнопкой «Create Agent».
                    </td>
                </tr>
                <tr th:classappend="${selectedId != null && selectedId == a.id} ? 'table-primary'" th:each="a : ${agents}">
                    <td class="admin-num" th:text="${a.id}">1</td>
                    <td th:text="${a.name}">agent_1</td>
                    <td th:text="${a.role}">CONVERSATION</td>
                    <td th:text="${a.provider}">OPENAI</td>
                    <td th:text="${a.model}">gpt-4o</td>
                    <td th:text="${a.temperature}">—</td>
                    <td class="admin-table-actions">
                        <a class="btn btn-sm btn-outline-secondary"
                           th:href="@{/admin/agents(selectedId=${a.id})}">
                            Open
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</div>

<div aria-hidden="true" class="modal fade" id="createAgentModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5">Create Agent</h2>
                <button class="btn-close" data-bs-dismiss="modal" type="button" aria-label="Close"></button>
            </div>
            <form method="post" th:action="@{/admin/agents/new}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body row g-3">
                    <div class="col-12">
                        <label class="form-label" for="newName">Name (unique)</label>
                        <input class="form-control" id="newName" name="name" required placeholder="my_agent">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newRole">Role</label>
                        <select class="form-select" id="newRole" name="role">
                            <option th:each="r : ${roles}" th:text="${r}" th:value="${r}">CONVERSATION</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newProvider">Provider</label>
                        <select class="form-select" id="newProvider" name="provider">
                            <option th:each="p : ${providers}" th:text="${p}" th:value="${p}">OPENAI</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="newModel">Model</label>
                        <input class="form-control" id="newModel" name="model" value="gpt-4o">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newTemp">Temperature</label>
                        <input class="form-control" id="newTemp" name="temperature" type="number" step="any">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newTopP">Top P</label>
                        <input class="form-control" id="newTopP" name="topP" type="number" step="any">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newFreq">Frequency penalty</label>
                        <input class="form-control" id="newFreq" name="frequencyPenalty" type="number" step="any">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="newPres">Presence penalty</label>
                        <input class="form-control" id="newPres" name="presencePenalty" type="number" step="any">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="newMem">Memory window</label>
                        <input class="form-control" id="newMem" min="1" name="memWindow" type="number" value="100">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="newPrompt">System prompt</label>
                        <textarea class="form-control" id="newPrompt" name="systemPrompt" rows="5"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancel</button>
                    <button class="btn btn-primary" type="submit">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div aria-hidden="true" class="modal fade" id="agentDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title fs-5">Edit Agent</h2>
                <button class="btn-close" data-bs-dismiss="modal" type="button" aria-label="Close"></button>
            </div>
            <div class="modal-body" th:if="${selectedAgent != null}">
                <form method="post" th:action="@{'/admin/agents/' + ${selectedAgent.id} + '/update'}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="editName">Name</label>
                            <input class="form-control" id="editName" name="name" required th:value="${selectedAgent.name}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="editRole">Role</label>
                            <select class="form-select" id="editRole" name="role">
                                <option th:each="r : ${roles}" th:selected="${r == selectedAgent.role}" th:text="${r}" th:value="${r}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="editProvider">Provider</label>
                            <select class="form-select" id="editProvider" name="provider">
                                <option th:each="p : ${providers}" th:selected="${p == selectedAgent.provider}" th:text="${p}" th:value="${p}"></option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="editModel">Model</label>
                            <input class="form-control" id="editModel" name="model" required th:value="${selectedAgent.model}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="editTemp">Temperature</label>
                            <input class="form-control" id="editTemp" name="temperature" step="any" type="number"
                                   th:value="${selectedAgent.temperature}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="editTopP">Top P</label>
                            <input class="form-control" id="editTopP" name="topP" step="any" type="number"
                                   th:value="${selectedAgent.topP}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="editFreq">Frequency penalty</label>
                            <input class="form-control" id="editFreq" name="frequencyPenalty" step="any" type="number"
                                   th:value="${selectedAgent.frequencyPenalty}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="editPres">Presence penalty</label>
                            <input class="form-control" id="editPres" name="presencePenalty" step="any" type="number"
                                   th:value="${selectedAgent.presencePenalty}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="editMem">Memory window</label>
                            <input class="form-control" id="editMem" min="1" name="memWindow" type="number"
                                   th:value="${selectedAgent.memWindow}">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="editPrompt">System prompt</label>
                            <textarea class="form-control" id="editPrompt" name="systemPrompt" rows="8"
                                      th:text="${selectedAgent.systemPrompt}"></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-primary" type="submit">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    (function () {
        var open = /*[[${openAgentDetailsModal}]]*/ false;
        var modalEl = document.getElementById('agentDetailsModal');
        var listUrl = /*[[@{/admin/agents}]]*/ '/admin/agents';
        if (!open || !modalEl || typeof bootstrap === 'undefined') {
            return;
        }
        bootstrap.Modal.getOrCreateInstance(modalEl).show();
        modalEl.addEventListener('hidden.bs.modal', function () {
            if (window.location.search.indexOf('selectedId=') !== -1) {
                window.location.replace(listUrl);
            }
        }, { once: true });
    })();
    /*]]>*/
</script>
</body>
</html>
