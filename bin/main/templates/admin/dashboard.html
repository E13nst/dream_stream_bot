<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-app">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="polite"></div>
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='dashboard')}"></th:block>

<!-- Предупреждение о дефолтном пароле -->
<div th:if="${showPasswordWarning}"
     class="modal fade" id="defaultPasswordModal" tabindex="-1"
     aria-labelledby="defaultPasswordModalLabel" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-warning">
            <div class="modal-header bg-warning-subtle">
                <h5 class="modal-title" id="defaultPasswordModalLabel">
                    Смените пароль администратора
                </h5>
            </div>
            <div class="modal-body">
                <p class="mb-1">Вы используете пароль по умолчанию <strong>«admin»</strong>.</p>
                <p class="text-muted small mb-0">Смените пароль прямо сейчас, чтобы защитить панель управления.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Позже</button>
                <a class="btn btn-warning btn-sm" th:href="@{/admin/settings}">Сменить пароль</a>
            </div>
        </div>
    </div>
</div>

<main class="admin-app__main">
    <h1 class="admin-page-title">Dashboard</h1>
    <p class="admin-section-lead">Сводка по пользователям, администраторам и ботам.</p>
    <div class="row g-3">
        <div class="col-md-3">
            <div class="card admin-stat-card admin-stat-card--interactive">
                <div class="card-body position-relative">
                    <a class="stretched-link" th:href="@{/admin/users}" aria-label="Открыть список пользователей"></a>
                    <p class="text-muted mb-1">Users</p>
                    <p class="h3 mb-0" th:text="${usersCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-stat-card admin-stat-card--interactive">
                <div class="card-body position-relative">
                    <a class="stretched-link" th:href="@{/admin/users}" aria-label="Открыть список пользователей (админы)"></a>
                    <p class="text-muted mb-1">Admins</p>
                    <p class="h3 mb-0" th:text="${adminsCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-stat-card admin-stat-card--interactive">
                <div class="card-body position-relative">
                    <a class="stretched-link" th:href="@{/admin/bots}" aria-label="Открыть управление ботами"></a>
                    <p class="text-muted mb-1">Bots</p>
                    <p class="h3 mb-0" th:text="${botsCount}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-stat-card admin-stat-card--interactive">
                <div class="card-body position-relative">
                    <a class="stretched-link" th:href="@{/admin/bots}" aria-label="Открыть список ботов (активные)"></a>
                    <p class="text-muted mb-1">Active Bots</p>
                    <p class="h3 mb-0" th:text="${activeBotsCount}">0</p>
                </div>
            </div>
        </div>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${showPasswordWarning}">
    new bootstrap.Modal(document.getElementById('defaultPasswordModal')).show();
</script>
</body>
</html>
