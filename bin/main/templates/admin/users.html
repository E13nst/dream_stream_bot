<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
<div class="admin-app">
<div class="admin-toast-host" id="adminToastHost" aria-atomic="true" aria-live="polite"></div>
<th:block th:replace="~{admin/fragments/nav-sidebar :: adminNav (active='users')}"></th:block>
<main class="admin-app__main">
    <h1 class="admin-page-title">Users</h1>
    <p class="admin-section-lead">Поиск по имени, username или Telegram ID. Таблица обновляется при вводе.</p>
    <div class="mb-3">
        <label class="form-label visually-hidden" for="usersSearch">Search users</label>
        <input class="form-control"
               hx-get="/admin/users/table"
               hx-indicator="#usersSearchIndicator"
               hx-target="#usersTable"
               hx-trigger="keyup changed delay:300ms, search"
               id="usersSearch"
               name="query"
               placeholder="Search by username, name or telegram id"
               th:value="${query}">
    </div>
    <div class="admin-skeleton htmx-indicator" id="usersSearchIndicator">
        <div class="admin-skeleton__row"></div>
        <div class="admin-skeleton__row"></div>
        <div class="admin-skeleton__row"></div>
        <div class="admin-skeleton__row"></div>
    </div>
    <div id="usersTable" th:replace="~{admin/fragments/users-table :: usersTable}"></div>
</main>
</div>
</body>
</html>
