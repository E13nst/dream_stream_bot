/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'org.springframework.boot' version '3.3.3'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'java'
    id 'org.flywaydb.flyway' version '10.8.1'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'telegram-bot-dream-stream'
sourceCompatibility = '17'
targetCompatibility = '17'

// Без прямого mavenCentral(): с одного IP часто режут repo1.maven.org. Используем зеркала Central + региональные.
repositories {
    mavenLocal()
    // Тот же индекс, что и Maven Central, но другой хост (обычно другие лимиты, чем у repo1.maven.org)
    maven { url 'https://maven-central.storage-download.googleapis.com/maven2/' }
    maven { url 'https://repo.huaweicloud.com/repository/maven/' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://jitpack.io' }
    maven { url 'https://repo.spring.io/milestone' }
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:1.0.0"
    }
}

dependencies {
    // Spring AI BOM для управления версиями
    implementation platform('org.springframework.ai:spring-ai-bom:1.0.0')
    
    implementation 'org.springframework.boot:spring-boot-starter'
    // OpenAI Spring Boot Starter (версия из BOM 1.0.0)
    implementation 'org.springframework.ai:spring-ai-starter-model-openai'
    // Chat Client и Memory для Spring AI 1.0.0
    implementation 'org.springframework.ai:spring-ai-autoconfigure-model-chat-client'
    implementation 'org.springframework.ai:spring-ai-autoconfigure-model-chat-memory'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'com.github.ben-manes.caffeine:caffeine'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
    implementation('org.telegram:telegrambots:6.9.7.1') {
        // Avoid legacy javax JAXB module auto-registration in Boot 3/Jakarta runtime
        exclude group: 'com.fasterxml.jackson.module', module: 'jackson-module-jaxb-annotations'
    }
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    
    // Swagger/OpenAPI
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.3.0'
    
    // Flyway для миграций БД
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'
    
    runtimeOnly 'org.postgresql:postgresql'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.12.0'
    testImplementation 'io.rest-assured:rest-assured:5.4.0'
    testImplementation 'io.rest-assured:json-schema-validator:5.4.0'
    testRuntimeOnly 'com.h2database:h2'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
